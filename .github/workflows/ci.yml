name: ci

on:
  # Disable auto triggers until stable version
  # push:
  #   branches: [main]
  # pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          path: litert-net

      # Needed by fetch-natives.sh for the prebuilt core / GPU / Gemma plugin.
      - name: Checkout LiteRT-LM
        uses: actions/checkout@v6
        with:
          repository: google-ai-edge/LiteRT-LM
          ref: main
          path: LiteRT-LM

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Fetch natives
        working-directory: litert-net
        run: |
          chmod +x scripts/fetch-natives.sh
          LITERT_LM_DIR="$GITHUB_WORKSPACE/LiteRT-LM" scripts/fetch-natives.sh   # -> src/LiteRT|src/LiteRT.LM/runtimes/<rid>/native

      - name: Restore
        working-directory: litert-net
        run: dotnet restore

      - name: Build (managed)
        working-directory: litert-net
        run: |
          dotnet build --no-restore -c Release "src/LiteRT/LiteRT.csproj"
          dotnet build --no-restore -c Release "src/LiteRT.LM/LiteRT.LM.csproj"

      - name: Pack
        working-directory: litert-net
        run: |
          dotnet pack -c Release -o artifacts "src/LiteRT.Gpu.Metal/LiteRT.Gpu.Metal.csproj"
          dotnet pack -c Release -o artifacts "src/LiteRT.Gpu.WebGpu/LiteRT.Gpu.WebGpu.csproj"
          dotnet pack -c Release -o artifacts "src/LiteRT.Gpu.OpenCl/LiteRT.Gpu.OpenCl.csproj"
          dotnet pack -c Release -o artifacts "src/LiteRT/LiteRT.csproj"
          dotnet pack -c Release -o artifacts "src/LiteRT.LM/LiteRT.LM.csproj"

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: litert-net/artifacts/*.nupkg
