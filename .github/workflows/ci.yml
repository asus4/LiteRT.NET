name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (managed)
        run: dotnet build --no-restore -c Release src/LiteRT/LiteRT.csproj src/LiteRT.LM/LiteRT.LM.csproj

      - name: Pack (managed)
        run: |
          dotnet pack --no-build -c Release -o artifacts src/LiteRT/LiteRT.csproj
          dotnet pack --no-build -c Release -o artifacts src/LiteRT.LM/LiteRT.LM.csproj

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
