name: release-unity

# Packs and signs the Unity UPM packages and attaches the .tgz archives to a GitHub Release,
# which OpenUPM consumes — natives only need to exist at `upm pack` time, they stay .gitignore'd.
# Trigger: push a v* tag matching the package.json versions; workflow_dispatch only uploads an artifact, no release.
# Secrets: UPM_SERVICE_ACCOUNT_KEY_ID, UPM_SERVICE_ACCOUNT_KEY_SECRET, UPM_ORG_ID (signing-capable Unity service account).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      litert_lm_ref:
        description: "LiteRT-LM git ref to source prebuilt core natives from (default: latest release tag)"
        required: false
        default: "latest"

permissions:
  contents: write

env:
  DIST_DIR: /tmp/upm-dist

jobs:
  release:
    name: Pack, sign and release Unity packages
    # macOS so fetch-natives can build the iOS LiteRt.xcframework (needs xcodebuild).
    runs-on: macos-14
    env:
      UPM_SERVICE_ACCOUNT_KEY_ID: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_ID }}
      UPM_SERVICE_ACCOUNT_KEY_SECRET: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_SECRET }}
      UPM_ORG_ID: ${{ secrets.UPM_ORG_ID }}
    steps:
      - name: Checkout LiteRT.NET
        uses: actions/checkout@v6
        with:
          path: litert-net

      - name: Verify tag matches package versions
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: litert-net
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CORE_VERSION="$(jq -r .version unity/LiteRT/package.json)"
          UTILS_VERSION="$(jq -r .version unity/LiteRT.Unity/package.json)"
          LM_VERSION="$(jq -r .version unity/LiteRT.LM/package.json)"
          CORE_DEP="$(jq -r '.dependencies["com.koki-ibukuro.litert"]' unity/LiteRT.Unity/package.json)"
          LM_CORE_DEP="$(jq -r '.dependencies["com.koki-ibukuro.litert"]' unity/LiteRT.LM/package.json)"
          echo "tag=$TAG_VERSION core=$CORE_VERSION utils=$UTILS_VERSION lm=$LM_VERSION dep=$CORE_DEP lm-dep=$LM_CORE_DEP"
          if [ "$CORE_VERSION" != "$TAG_VERSION" ] || [ "$UTILS_VERSION" != "$TAG_VERSION" ] \
            || [ "$LM_VERSION" != "$TAG_VERSION" ] || [ "$CORE_DEP" != "$TAG_VERSION" ] \
            || [ "$LM_CORE_DEP" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json versions (core=$CORE_VERSION, utils=$UTILS_VERSION, lm=$LM_VERSION, dep=$CORE_DEP, lm-dep=$LM_CORE_DEP)"
            exit 1
          fi

      # Default to the latest release tag, not main — the C ABI must match the committed bindings.
      - name: Resolve LiteRT-LM ref
        id: litert-lm
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED: ${{ inputs.litert_lm_ref || 'latest' }}
        run: |
          if [ "$REQUESTED" = "latest" ]; then
            REF="$(gh release view --repo google-ai-edge/LiteRT-LM --json tagName -q .tagName)"
          else
            REF="$REQUESTED"
          fi
          echo "Using LiteRT-LM ref: $REF"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout LiteRT-LM (prebuilt core natives)
        uses: actions/checkout@v6
        with:
          repository: google-ai-edge/LiteRT-LM
          ref: ${{ steps.litert-lm.outputs.ref }}
          path: litert-lm
          lfs: true  # prebuilt/ binaries are LFS; without this we get pointer files

      # libLiteRtLmC is not prebuilt upstream. TODO: promote build-natives outputs to a release for a pinned source.
      - name: Fetch libLiteRtLmC from the latest build-natives run
        working-directory: litert-net
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID="$(gh run list --workflow build-natives --status success --limit 1 --json databaseId -q '.[0].databaseId')"
          if [ -z "$RUN_ID" ]; then
            echo "::error::No successful build-natives run found; run that workflow first to produce libLiteRtLmC artifacts."
            exit 1
          fi
          gh run download "$RUN_ID" -n libLiteRtLmC-osx-arm64     -D out
          gh run download "$RUN_ID" -n libLiteRtLmC-android-arm64 -D out/android-arm64
          gh run download "$RUN_ID" -n libLiteRtLmC-android-x64   -D out/android-x64
          gh run download "$RUN_ID" -n libLiteRtLmC-ios           -D out/ios
          ls -laR out

      - name: Populate native libraries
        working-directory: litert-net
        env:
          LITERT_LM_DIR: ${{ github.workspace }}/litert-lm
        run: |
          chmod +x scripts/*.sh
          scripts/fetch-natives.sh
          scripts/sync-unity-natives.sh
          scripts/sync-unity-bindings.sh

      - name: Verify the bindings synced clean (no drift)
        working-directory: litert-net
        run: git diff --exit-code unity/LiteRT/Runtime/Bindings unity/LiteRT.LM/Runtime/Bindings

      # fetch-natives.sh is best-effort — catch empty payloads before packing.
      - name: Verify native plugin payloads
        working-directory: litert-net
        run: |
          file unity/LiteRT/Plugins/macOS/libLiteRt.dylib | grep Mach-O
          file unity/LiteRT.LM/Plugins/macOS/libLiteRtLmC.dylib | grep Mach-O
          file unity/LiteRT.LM/Plugins/Android/arm64-v8a/libLiteRtLmC.so | grep ELF
          file unity/LiteRT.LM/Plugins/Android/x86_64/libLiteRtLmC.so | grep ELF
          file unity/LiteRT/Plugins/iOS/LiteRt.xcframework/ios-arm64/LiteRt.framework/LiteRt | grep Mach-O
          file unity/LiteRT.LM/Plugins/iOS/LiteRtLmC.xcframework/ios-arm64/LiteRtLmC.framework/LiteRtLmC | grep Mach-O
          file unity/LiteRT.LM/Plugins/iOS/GemmaModelConstraintProvider.xcframework/ios-arm64/GemmaModelConstraintProvider.framework/GemmaModelConstraintProvider | grep Mach-O
          find unity/LiteRT/Plugins unity/LiteRT.LM/Plugins -type f ! -name '*.meta' ! -name 'Info.plist' -size -1k | grep . && {
            echo "::error::Suspiciously small plugin files found"; exit 1; } || true

      - name: Install Unity UPM CLI
        run: |
          curl -fsSL https://cdn.packages.unity.com/upm-cli/install.sh -o install.sh
          bash install.sh
          echo "$HOME/.upm/bin" >> "$GITHUB_PATH"

      - name: Pack and sign packages
        working-directory: litert-net
        run: |
          mkdir -p "$DIST_DIR"
          upm pack ./unity/LiteRT       --organization-id "$UPM_ORG_ID" --destination "$DIST_DIR"
          upm pack ./unity/LiteRT.Unity --organization-id "$UPM_ORG_ID" --destination "$DIST_DIR"
          upm pack ./unity/LiteRT.LM    --organization-id "$UPM_ORG_ID" --destination "$DIST_DIR"

      - name: Verify packed archives are signed
        run: |
          ls -la "$DIST_DIR"
          for a in "$DIST_DIR"/*.tgz; do
            echo "--- $a"
            tar -tzf "$a" | grep -Fx 'package/package.json'
            tar -tzf "$a" | grep -Fx 'package/.attestation.p7m'
          done

      - name: Upload archives as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: upm-packages
          path: /tmp/upm-dist/*.tgz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/upm-dist/*.tgz
