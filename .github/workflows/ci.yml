name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      litert_lm_ref:
        description: "LiteRT-LM git ref to source prebuilt natives from (default: latest release tag)"
        required: false
        default: "latest"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          path: litert-net

      # The prebuilt binaries and the committed bindings must share the same C ABI, so
      # default to the latest LiteRT-LM release tag instead of main (which can drift).
      - name: Resolve LiteRT-LM ref
        id: litert-lm
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED: ${{ inputs.litert_lm_ref || 'latest' }}
        run: |
          if [ "$REQUESTED" = "latest" ]; then
            REF="$(gh release view --repo google-ai-edge/LiteRT-LM --json tagName -q .tagName)"
          else
            REF="$REQUESTED"
          fi
          echo "Using LiteRT-LM ref: $REF"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      # Needed by fetch-natives.sh for the prebuilt core / GPU / Gemma plugin.
      - name: Checkout LiteRT-LM
        uses: actions/checkout@v6
        with:
          repository: google-ai-edge/LiteRT-LM
          ref: ${{ steps.litert-lm.outputs.ref }}
          path: LiteRT-LM
          lfs: true  # prebuilt/ binaries are LFS; without this we get pointer files

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Fetch natives
        working-directory: litert-net
        run: |
          chmod +x scripts/fetch-natives.sh
          LITERT_LM_DIR="$GITHUB_WORKSPACE/LiteRT-LM" scripts/fetch-natives.sh   # -> src/LiteRT|src/LiteRT.LM/runtimes/<rid>/native

      - name: Restore
        working-directory: litert-net
        run: dotnet restore

      - name: Build (managed)
        working-directory: litert-net
        run: |
          dotnet build --no-restore -c Release "src/LiteRT/LiteRT.csproj"
          dotnet build --no-restore -c Release "src/LiteRT.LM/LiteRT.LM.csproj"

      - name: Pack
        working-directory: litert-net
        run: |
          dotnet pack -c Release -o artifacts "src/LiteRT.Gpu.Metal/LiteRT.Gpu.Metal.csproj"
          dotnet pack -c Release -o artifacts "src/LiteRT.Gpu.WebGpu/LiteRT.Gpu.WebGpu.csproj"
          dotnet pack -c Release -o artifacts "src/LiteRT.Gpu.OpenCl/LiteRT.Gpu.OpenCl.csproj"
          dotnet pack -c Release -o artifacts "src/LiteRT/LiteRT.csproj"
          dotnet pack -c Release -o artifacts "src/LiteRT.LM/LiteRT.LM.csproj"

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: litert-net/artifacts/*.nupkg
